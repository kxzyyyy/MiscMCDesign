<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Misc MC Store</title>
  <link rel="stylesheet" href="/shared.css">
  <script src="/main.js" defer></script>
</head>
<body>
  <div class="main-container">
    <nav class="navigation">
      <div class="navigation__logo">
        <img src="/logomisc.png" alt="Misc MC Logo" class="navigation__logo-img">
      </div>
      <div class="navigation__server-info">
        <div class="navigation__server-ip">
          miscmc.net
          <span class="navigation__server-ip-copy">📋</span>
        </div>
        <div class="player-widget">
          <div class="player-widget__dot"></div>
          <span class="player-widget__text">421 Players Online</span>
        </div>
      </div>
    </nav>

    <div class="hero-banner" style="background-image: url('/bannermisc.png');"></div>

    <div class="content-grid">
      <aside class="sidebar">
        <a href="#" class="sidebar__nav-item sidebar__nav-item--active">Credits</a>
        <a href="#" class="sidebar__nav-item">About</a>
      </aside>
      
      <div class="packages-grid">
        <div class="package-card">
          <div class="package-card__credits">1,000 Credits</div>
          <div class="package-card__credits-bar">
            <div class="package-card__credits-bar-fill" style="width: 20%;"></div>
          </div>
          <div class="package-card__price">$5.00</div>
          <a href="#" class="package-card__buy-btn">
            🛒 Buy
          </a>
        </div>
        
        <div class="package-card">
          <div class="package-card__credits">5,000 Credits</div>
          <div class="package-card__credits-bar">
            <div class="package-card__credits-bar-fill" style="width: 40%;"></div>
          </div>
          <div class="package-card__price">$20.00</div>
          <a href="#" class="package-card__buy-btn">
            🛒 Buy
          </a>
        </div>
        
        <div class="package-card">
          <div class="package-card__badge">MOST POPULAR</div>
          <div class="package-card__credits">10,000 Credits</div>
          <div class="package-card__credits-bar">
            <div class="package-card__credits-bar-fill" style="width: 60%;"></div>
          </div>
          <div class="package-card__price">$35.00</div>
          <a href="#" class="package-card__buy-btn">
            🛒 Buy
          </a>
        </div>
        
        <div class="package-card">
          <div class="package-card__credits">20,000 Credits</div>
          <div class="package-card__credits-bar">
            <div class="package-card__credits-bar-fill" style="width: 80%;"></div>
          </div>
          <div class="package-card__price">$60.00</div>
          <a href="#" class="package-card__buy-btn">
            🛒 Buy
          </a>
        </div>
        
        <div class="package-card">
          <div class="package-card__badge package-card__badge--best-value">BEST VALUE</div>
          <div class="package-card__credits">30,000 Credits</div>
          <div class="package-card__credits-bar">
            <div class="package-card__credits-bar-fill" style="width: 100%;"></div>
          </div>
          <div class="package-card__price">$80.00</div>
          <a href="#" class="package-card__buy-btn">
            🛒 Buy
          </a>
        </div>
      </div>
    </div>

    <div class="checkout-footer">
      <div class="checkout-input">
        <input type="text" class="checkout-input__field" placeholder="Creator Code">
        <button class="checkout-input__btn--apply">Apply</button>
      </div>
      
      <div class="checkout-input">
        <input type="text" class="checkout-input__field" placeholder="Redeem Gift Card">
        <button class="checkout-input__btn--redeem">Redeem</button>
      </div>
    </div>
  </div>
</body>
</html>
